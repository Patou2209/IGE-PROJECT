  <div class="auth-body">
    <button class="contact-top">CONTACTEZ NOUS <i class="fas fa-arrow-right-to-bracket"></i></button>
    <div class="auth-shell">
      <main class="auth-main">
        <div class="auth-card">
          <div class="auth-card-head">
            <h2>Connexion</h2>
            
          </div>

          <form id="login-form" class="auth-form" autocomplete="on">
            <div class="form-field">
              <label for="email"><i class="fas fa-envelope"></i> Adresse e-mail</label>
              <input type="email" id="email" name="email" placeholder="exemple@education.rdc" required />
            </div>

            <div class="form-field">
              <label for="password"><i class="fas fa-lock"></i> Mot de passe</label>
              <div class="password-wrap">
                <input type="password" id="password" name="password" placeholder="Votre mot de passe" required />
                <button type="button" class="password-toggle" id="toggle-pass" aria-label="Afficher le mot de passe">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="form-row">
              <label class="checkbox">
                <input type="checkbox" id="remember" />
                <span class="link-muted">Se souvenir de moi</span>
              </label>
              <a href="#" id="forgot-link" class="link-muted">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="login-btn">
              <span class="btn-label"><i class="fas fa-arrow-right-to-bracket"></i> Se connecter</span>
              <span class="btn-loader hidden"><i class="fas fa-spinner fa-spin"></i></span>
            </button>

            <div id="auth-message" class="auth-message hidden"></div>
          </form>

          <div class="auth-card-foot">
            <p><i class="fas fa-circle-info"></i> Les identifiants sont attribués par votre niveau supérieur.</p>
          </div>
        </div>
      </main>
    </div>
  </div>
